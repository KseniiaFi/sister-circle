<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisterCircle — Women Helping Women</title>
</head>
<body>
    <header>
        <nav>
        <a href="/">SisterCircle 🌸</a>
        <ul>
            <li><a href="/feed">Requests</a></li>
            <li><a href="/how">How it works</a></li>
            <li><a href="/login">Sign in</a></li>
        </ul>
        </nav>
    </header>
    
    <main>

        <section>
            <h1>Join the circle of support</h1>
            <p>Help others - get help yourself</p>

            <form>
                <label for="name">Your name</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Anna"
                  required
               >

               <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="anna@example.com"
                    required
                >

                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="At least 8 characters"
                    required
                >

                <label for="category">How can you help?</label>
                <select id="category" name="category">
                    <option value="">Select a category</option>
                    <option value="legal">Legal assistance</option>
                    <option value="resume">Resume and career</option>
                    <option value="kids">Children and parenting</option>
                    <option value="cooking">Cooking and recipes</option>
                    <option value="english">English language</option>
                    <option value="other">Other</option>
                </select>

                <button type="submit">Create Account</button>
            </form>

        </section>

        <section>
            <h2>Recent requests</h2>
            
            <article>
                <h3>Looking for a Finish pie recipe</h3>
                <p>Want to surprise my family this weekend 🥧</p>
                <footer>
                    <span>Olga · Tampere</span>
                    <span>Cooking</span>
                </footer>
            </article>

        </section>
    </main>

     <footer>
    <p>© 2026 SisterCircle · Made with love 🌸</p>
    <nav>
      <a href="/about">About</a>
      <a href="/privacy">Privacy</a>
    </nav>
  </footer>

</body>
</html>
